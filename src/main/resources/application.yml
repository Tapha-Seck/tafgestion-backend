spring:
  application:
    name: TafGestion

  datasource:
    url: jdbc:postgresql://localhost:5432/tafgestion
    username: tafgestion_user
    password: tafgestion2025
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: tafgestion-secret-key-must-be-at-least-256-bits-long-for-security
  expiration: 86400000
  refresh-expiration: 604800000