version: '3.8'

services:
  db:
    image: postgres:15
    container_name: tafgestion_db
    environment:
      POSTGRES_DB: tafgestion
      POSTGRES_USER: tafgestion_user
      POSTGRES_PASSWORD: tafgestion2025
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: